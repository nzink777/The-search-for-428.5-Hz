name: The Fox Hunt
on:
  push:
    paths-ignore:
      - 'results/**'
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
      - name: Install dependencies
        run: pip install scipy numpy matplotlib
      - name: Run Hunt
        run: python scripts/process_signals.py
      - name: Commit Results
        run: |
          git config --global user.name 'Technomouse-Bot'
          git add results/
          git commit -m "Automated signal scan"
          git push
          
